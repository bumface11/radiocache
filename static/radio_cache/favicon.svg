<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#feca57"/>
      <stop offset="100%" stop-color="#48dbfb"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f1f2f6" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#bgGrad)"/>

  <!-- Radio waves -->
  <path d="M9 22
           C 11 18, 13 16, 16 16
           C 19 16, 21 18, 23 22"
        fill="none"
        stroke="url(#waveGrad)"
        stroke-width="2.2"
        stroke-linecap="round"/>

  <path d="M7 22
           C 10 16, 13 13, 16 13
           C 19 13, 22 16, 25 22"
        fill="none"
        stroke="url(#waveGrad)"
        stroke-width="1.4"
        stroke-linecap="round"
        opacity="0.85"/>

  <!-- Central podcast / mic circle -->
  <circle cx="16" cy="14" r="5.2" fill="#1e272e" opacity="0.9"/>

  <!-- Mic body -->
  <rect x="14.4" y="11.2" width="3.2" height="4.4" rx="1.4" fill="#ffffff"/>
  <path d="M13.5 14.5
           C 13.5 16.3, 14.7 17.5, 16 17.5
           C 17.3 17.5, 18.5 16.3, 18.5 14.5"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.1"
        stroke-linecap="round"/>

  <!-- Mic stand -->
  <line x1="16" y1="17.5" x2="16" y2="19.5" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="13.5" y1="20.5" x2="18.5" y2="20.5" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Subtle highlight -->
  <circle cx="11" cy="9" r="3" fill="white" opacity="0.18"/>
</svg>
