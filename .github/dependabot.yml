version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"

  # Python (uv) dependencies are managed by the Renovate GitHub App.
  # See renovate.json and .github/RENOVATE.md for configuration details.

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly