name: Refresh Radio Drama Cache

on:
  schedule:
    # Daily recent refresh at 18:15 UTC
    - cron: "15 18 * * *"
    # Weekly full refresh at 04:00 UTC on Sundays
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      depth:
        description: "Refresh depth"
        required: false
        default: "full"
        type: choice
        options:
          - recent
          - full

permissions:
  contents: write

env:
  CATEGORIES: audiobooks comedy factual docudramas documentaries drama films gamesandquizzes podcasts readings

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Determine refresh depth
        id: depth
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.depth }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 4 * * 0" ]; then
            echo "value=full" >> "$GITHUB_OUTPUT"
          else
            echo "value=recent" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh cache (${{ steps.depth.outputs.value }})
        run: |
          uv run python -m radio_cache.refresh \
            --db radio_cache.db \
            --db-snapshot radio_cache.db.zip \
            --no-json \
            --verbose \
            --depth ${{ steps.depth.outputs.value }} \
            --categories ${{ env.CATEGORIES }}

      - name: Upload cache artefacts
        uses: actions/upload-artifact@v4
        with:
          name: radio-cache
          path: |
            radio_cache.db.zip
            radio.cache
          retention-days: 7

      - name: Publish latest cache snapshot release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view cache-latest >/dev/null 2>&1; then
            gh release upload cache-latest radio_cache.db.zip radio.cache --clobber
          else
            gh release create cache-latest radio_cache.db.zip radio.cache \
              --title "Latest radio cache snapshot" \
              --notes "Automated SQLite snapshot for radiocache deployments."
          fi
