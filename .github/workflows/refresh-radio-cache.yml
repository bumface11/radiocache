name: Refresh Radio Drama Cache

on:
  schedule:
    # Run daily at 18:15 UTC
    - cron: "15 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Refresh cache
        run: |
          uv run python -m radio_cache.refresh \
            --db radio_cache.db \
            --json radio_cache_export.json \
            --verbose \
            --categories audiobooks comedy factual docudramas documentaries drama films gamesandquizzes podcasts readings

      - name: Upload cache artefacts
        uses: actions/upload-artifact@v4
        with:
          name: radio-cache
          path: |
            radio_cache.db
            radio_cache_export.json
            radio.cache
          retention-days: 7

      - name: Commit updated cache export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radio_cache_export.json radio.cache
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh radio drama cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
