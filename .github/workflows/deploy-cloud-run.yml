name: Deploy to Cloud Run

# Triggered when any file that is baked into the Docker image changes on main.
# Runs the test suite first; deployment only proceeds if tests pass.
#
# Prerequisites — add these as GitHub Actions secrets:
#
#   GCP_SA_KEY   JSON key for a GCP service account with the following roles
#                in the radiodrama project:
#                  - roles/cloudbuild.builds.editor
#                  - roles/run.admin
#                  - roles/iam.serviceAccountUser
#                  - roles/artifactregistry.writer

on:
  push:
    branches: [main]
    paths:
      - uv.lock
      - Dockerfile
      - radio_cache_api.py
      - pyproject.toml
      - "radio_cache/**"
      - "templates/**"
      - "static/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies (including dev)
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  deploy:
    name: Build and deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --project radiodrama \
            --region europe-west2 \
            --tag europe-west2-docker.pkg.dev/radiodrama/radiocache/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy radiocache \
            --project radiodrama \
            --region europe-west2 \
            --image europe-west2-docker.pkg.dev/radiodrama/radiocache/app:latest \
            --update-env-vars RADIO_CACHE_DB_SNAPSHOT_URL=https://github.com/bumface11/radiocache/releases/latest/download/radio_cache.db.zip \
            --remove-env-vars RADIO_CACHE_GITHUB_URL \
            --max-instances 1
