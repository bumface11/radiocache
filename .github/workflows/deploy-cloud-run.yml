name: Test on change (deploy manually)

# Triggered when any file baked into the Docker image changes on main.
# Runs tests and reminds you to deploy manually if they pass.

on:
  push:
    branches: [main]
    paths:
      - uv.lock
      - Dockerfile
      - radio_cache_api.py
      - pyproject.toml
      - "radio_cache/**"
      - "templates/**"
      - "static/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies (including dev)
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  notify:
    name: Deploy reminder
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Post deploy instructions
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Deploy to Cloud Run

          Tests passed. Run the **Build and Deploy to Cloud Run** task in VS Code, or:

          ```bash
          gcloud builds submit \
            --project radiodrama \
            --region europe-west2 \
            --tag europe-west2-docker.pkg.dev/radiodrama/radiocache/app:latest

          gcloud run deploy radiocache \
            --project radiodrama \
            --region europe-west2 \
            --image europe-west2-docker.pkg.dev/radiodrama/radiocache/app:latest \
            --update-env-vars RADIO_CACHE_DB_SNAPSHOT_URL=https://github.com/bumface11/radiocache/releases/latest/download/radio_cache.db.zip \
            --remove-env-vars RADIO_CACHE_GITHUB_URL \
            --max-instances 1
          ```
          EOF
