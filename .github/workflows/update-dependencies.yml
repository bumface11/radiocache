name: Update Python Dependencies (RETIRED)

# ⚠️  This workflow has been retired in favour of the Renovate GitHub App.
#
# Renovate is now responsible for opening monthly dependency-update PRs.
# It runs `uv lock --upgrade`, commits uv.lock, and opens a single grouped PR
# on the first of each month — matching the intent of the original workflow.
#
# See renovate.json at the repo root and .github/RENOVATE.md for details.
# To re-enable Renovate, install the app at https://github.com/apps/renovate
# and ensure it has access to this repository.
#
# This workflow is intentionally disabled (no schedule trigger).
# The workflow_dispatch trigger is retained so the lock-file upgrade step
# can still be run manually on demand without creating a PR.

on:
  # schedule deliberately removed — Renovate handles the periodic PR
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — upgrade lock file locally but do not commit or push"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Upgrade locked dependencies
        # Excludes packages released in the last 14 days to avoid
        # cutting-edge instability — mirrors the original workflow intent.
        run: |
          CUTOFF=$(date -d '14 days ago' --utc +'%Y-%m-%dT%H:%M:%SZ')
          uv lock --upgrade --exclude-newer "$CUTOFF"

      - name: Show changed packages (dry run)
        run: |
          if git diff --quiet uv.lock; then
            echo "No package changes found."
          else
            echo "### Changed packages (uv.lock diff summary):"
            git diff uv.lock | grep '^[+-].*version' | head -60
          fi

      - name: Note about PR creation
        run: |
          echo "ℹ️  PR creation is handled by the Renovate GitHub App, not this workflow."
          echo "   See renovate.json and .github/RENOVATE.md for configuration details."
